<!doctype html>
<!-- 
	This is a demo browser app that lets you set your device intensity directly.
	See App.js for the code.
	If you want to use the console for debugging, entry point is window.App; 

	Stuff needed for a unit test:
	- Send program
	- Send direct data
	- Get battery reading
	- Get temperature reading
	

-->

<html lang="en">
<head>
	<meta charset="utf-8">
	<title>Demo App</title>
	<style type="text/css">

		html, body {
			height: 100%;
			margin: 0;
			padding: 0;
			font-family: Verdana, Geneva, Tahoma, sans-serif;
			font-size:1em;
		}
		input:not([type=range]){
			font-size:1.5em;
			padding:0.5em;
		}
		input[type=range]{
			width:50%;
			margin:0 1vmax;
		}
		table{
			width:100%;
		}
		body{
			min-height: 100vh;
			background:#EDE;
			display:flex;
			justify-content: center;
			align-items: center;
		}
		.strong{
			font-weight: bold;
		}
		#wrap{
			position:relative;
			background:rgba(255,255,255,.75);
			border-radius: 1vmax;
			padding:1vmax;
			box-shadow: 0.5vmax 0.5vmax 1vmax rgba(0,0,0,.25);
			border: 3px double #FFF;
			box-sizing: border-box;
			width: auto;
			max-width: 95vw;
		}
		label{
			background:#FFF;
			border-radius: 0.5vmax;
			margin:0.2vmax 0;
			padding:1vmax;
			
		}
		*.flex{
			display:flex;
			align-items: center;
		}

	</style>

	<!--[if lt IE 9]>
		<script src="https://cdnjs.cloudflare.com/ajax/libs/html5shiv/3.7.3/html5shiv.js"></script>
	<![endif]-->
	<script src='https://vibhub.io/socket.io/socket.io.js'></script>

	<!-- 

		The script is put inline here so it can run locally

	 -->
	<script type="module">

		// Import the vibhub JS library
		import {default as VH, VhProgram as Program, VhStage as Stage} from 'https://vibhub.io/cdn/vh-socket-1.0.0.js';

		// Add an extending class that handles our custom logic
		class App extends VH{
			
			constructor(...args){
				super(...args);

				// Grab some stuff from the DOM
				this.devidField = document.getElementById('devid');
				this.intensityFields = document.querySelectorAll('input.intensity');
				this.pulseButton = document.querySelector('input.sendPulse');
				this.controls = document.getElementById('controls');
				this.getBatteryButton = document.querySelector('input.getBattery');
				this.controls.style = 'display:none';
				this.batteryInfo = document.querySelector('.batteryInfo');
				this.highres = document.querySelector('input.highres');

				// Device object from the app
				this.device = null;

				// device ID changed
				this.devidField.onchange = () => this.onDeviceIdChange();
				this.intensityFields.forEach((el, idx) => {
					el.oninput = () => this.onSliderChange(el, idx);
				});
				this.pulseButton.onclick = () => this.onProgramButtonPressed();
				this.getBatteryButton.onclick = () => this.onGetBatteryButtonPressed();


			}

			// A custom connect method so we can use async
			async connect(){

				// Setup the connection, send the name etc
				await this.begin();
				
				// Now we're connected, enable the input
				this.devidField.disabled = false;


			}

			// A device connected to this app has come online or been added
			onDeviceOnline( device ){

				// Update the PWM values to our currently set values
				console.log("The device", device, "has come online");
				this.device.sendPWM();
				this.controls.style = '';

			}

			// A device connected to this app has gone offline
			onDeviceOffline( device ){

				console.log("Device", device, "has gone offline");
				this.controls.style = 'display:none';

			}

			// Raised 60 times per second
			onTick(){}
		

			// DOM Events
			async onDeviceIdChange(){

				// Wipe all devices since we only want the one device in our app
				await this.wipeDevices();

				console.log("Adding new device");
				// Add the new device
				this.device = await this.addDevice(this.devidField.value);

				// Keep in mind the device has not come online here.
				// We now have a device object, but it's not online yet.
				// We can track that in the onDeviceOnline method

			}

			onDeviceBoardStatus( device ){

				this.getBatteryButton.value = "Update Status"

				//this.batteryInfo.innerText = 'Low battery status: ' + (device.batteryLow ? 'YES' : 'NO')+' | Battery mV: ' + device.batteryMillivolts + ' | Battery max mV: ' + (device.batteryMaxMillivolts)+ ' | Temperature: '+device.temperatureC;
				document.getElementById('hwversion').innerText = device.hwversion;
				document.getElementById('fwversion').innerText = device.version;
				document.getElementById('temperature').innerText = device.temperatureC;
				document.getElementById('numports').innerText = device.numPorts;
				document.getElementById('battery').innerText = device.batteryMillivolts;
				document.getElementById('batteryMax').innerText = device.batteryMaxMillivolts;
				document.getElementById('batteryStatus').innerText = device.batteryLow ? 'LOW' : 'OK';
				const caps = device.capabilities || {};
				document.getElementById('hdBits').innerText = parseInt(caps.h) || '???';

				let capText = document.createElement('ul');
				
				const addLi = text => {
					const li = document.createElement('li');
					li.innerText = text;
					capText.append(li);
				}

				if( caps.app )
					addLi('App connect detection.');
				if( caps.p )
					addLi('PWM All.');
				if( caps.ps )
					addLi('PWM Specific.');
				if( caps.vib )
					addLi('Program support.');
				if( caps.app_offline )
					addLi('App disconnect detection.');
				if( caps.dCustom )
					addLi('Can receive custom data from app.');
				if( caps.aCustom )
					addLi('Can send custom data to app.');
				if( caps.sb )
					addLi('Board status updates.');
				if( caps.temp )
					addLi('Temperature sensor.');
				if( caps.bat )
					addLi('Battery sensor.');

				console.log(capText);

				document.getElementById('capabilities').replaceChildren(capText);

			}

			updateHighRes(){
				if( this.device )
					this.device.setHighRes(this.highres.checked);
			}

		
			onSliderChange( element, idx ){

				if( !this.device )
					return;

				// This relies on the auto ticker, limiting to 60 updates per second.
				// You can call set as much as you like, but it only updates 60 times per second.
				// If you want to make intensity ramp up/down or pulse etc, you should use a program instead.
				this.updateHighRes();
				this.device.set( +element.value, idx );
				

			}

			
			onProgramButtonPressed(){

				this.updateHighRes();
				
				const program = new Program([0,1,2,3]);
				program.addStage(new Stage({
					intensity:255, 
					duration:1000,
					yoyo : 1,
					repeats : 1,
				}));
				this.device.sendProgram(program);

			}

			onGetBatteryButtonPressed(){

				this.getBatteryButton.value = "Refreshing Status...";
				this.device.getBoardStatus();

			}
		
		}

		

		// Begin on window load
		window.onload = () => {

			console.log("Entry point is App");
			window.App = new App( "My Test App" );
			const app = window.App;
			app.connect().then(() => {
				if( window.location.hash.length > 10 ){

					let id = window.location.hash;
					if( id[0] == '#' )
						id = id.slice(1);
					app.devidField.value = id;
					return app.onDeviceIdChange();

				}
			});

		};


	</script>
</head>

<body>
	<div id="wrap">
		<h2>Device ID</h2>
		<div class="flex">
			<input type="text" placeholder="Device ID" id="devid" disabled />
			<label>High Res <input type="checkbox" class="highres" /></label><br />
		</div>
		<p id="debug"></p>
		
		<div id="controls">

			<h2>Controls</h2>
			
			<!-- Create the sliders you'll drag to change intensity -->
			<label class="port flex">Port 0 <input type="range" class="intensity" min=0 max=1 step=0.01 value="0" /></label>
			<label class="port flex">Port 1 <input type="range" class="intensity" min=0 max=1 step=0.01 value="0" /></label>
			<label class="port flex">Port 2 <input type="range" class="intensity" min=0 max=1 step=0.01 value="0" /></label>
			<label class="port flex">Port 3 <input type="range" class="intensity" min=0 max=1 step=0.01 value="0" /></label>

			<br />
			<input type="button" class="sendPulse" value="Send Pulse" />
			<input type="button" class="getBattery" value="Update Status" />
			

			<div class="batteryInfo">
				<table>
					<tr><th>Property</th><th>Value</th></th></tr>
					<tr><td>Hardware Version</td><td id="hwversion" class="strong"></td></tr>
					<tr><td>Firmware Version</td><td id="fwversion" class="strong"></td></tr>
					<tr><td>Temperature</td><td id="temperature"></td></tr>
					<tr><td>Num Ports</td><td id="numports"></td></tr>
					<tr><td>Battery mV</td><td id="battery"></td></tr>
					<tr><td>Battery Max mV</td><td id="batteryMax"></td></tr>
					<tr><td>Battery Status</td><td id="batteryStatus"></td></tr>
					<tr><td>Capabilities</td><td id="capabilities"></td>
					<tr><td>HD Bits Support</td><td id="hdBits"></td></tr>
				</table>
			</div>
			
			<br />
		</div>
	</div>
</body>
</html>
